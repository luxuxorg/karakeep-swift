<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karakeep — Options</title>
  <link rel="icon" href="icons/icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="options-body">
    <h1><img src="icons/icon.png" alt="" class="options-logo" aria-hidden="true">Karakeep Settings</h1>

    <div class="field">
      <label for="serverUrl">Server URL</label>
      <input type="url" id="serverUrl" placeholder="https://karakeep.example.com" autocomplete="off">
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <div class="field-row">
        <input type="password" id="apiKey" placeholder="Your API key" autocomplete="off">
        <button class="btn-secondary" id="forgetKeyBtn" style="display:none">Forget key</button>
      </div>
    </div>

    <div class="options-actions">
      <button class="btn-primary" id="saveBtn">Save</button>
      <button class="btn-secondary" id="testBtn">Test Connection</button>
      <span class="status-msg" id="statusMsg"></span>
    </div>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
